{% extends "base.html" %}
{% block content %}

<div class="max-w-5xl mx-auto p-6">
  <h1 class="text-2xl font-bold mb-4">Manage Shows</h1>

  <!-- CREATE -->
  <form method="POST" action="{{ url_for('admin_shows_create') }}" class="mb-8 space-y-3">
    <input name="title" placeholder="Title" class="w-full border p-2 rounded" required>
    <input name="slug" placeholder="Slug" class="w-full border p-2 rounded" required>
    <input name="date" placeholder="Date" class="w-full border p-2 rounded">
    <input name="time" placeholder="Time" class="w-full border p-2 rounded">
    <input name="location_name" placeholder="Location" class="w-full border p-2 rounded">
    <input name="address" placeholder="Address" class="w-full border p-2 rounded">
    <button class="bg-blue-600 text-white px-4 py-2 rounded">Create Show</button>
  </form>

  <!-- LIST -->
  {% for s in shows %}
  <div class="border p-4 mb-4 rounded">
    <form method="POST" action="{{ url_for('admin_shows_update', show_id=s.id) }}" class="space-y-2">
      <input name="title" value="{{ s.title }}" class="w-full border p-2 rounded">
      <input name="slug" value="{{ s.slug }}" class="w-full border p-2 rounded">
      <input name="date" value="{{ s.date }}" class="w-full border p-2 rounded">
      <input name="location_name" value="{{ s.location_name }}" class="w-full border p-2 rounded">

      <label class="flex gap-2">
        <input type="checkbox" name="hide_address" {% if s.hide_address %}checked{% endif %}>
        Hide Address
      </label>

      <button class="bg-green-600 text-white px-3 py-1 rounded">Save</button>
    </form>

    <div class="mt-3 flex gap-2">
      <form method="POST" action="{{ url_for('admin_shows_set_active', show_id=s.id) }}">
        <button class="border px-3 py-1 rounded">Active</button>
      </form>

      <form method="POST" action="{{ url_for('admin_shows_set_upcoming', show_id=s.id) }}">
        <button class="border px-3 py-1 rounded">Upcoming</button>
      </form>
    </div>
  </div>
  {% endfor %}

</div>

{% endblock %}
