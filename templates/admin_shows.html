{% extends "base.html" %}
{% set title = "Manage Shows • Karman Kar Shows & Events" %}

{% block content %}
<div class="max-w-6xl mx-auto">

  <h1 class="text-3xl font-semibold mb-6">Manage Shows</h1>

  {% for s in shows %}
  <form method="POST" enctype="multipart/form-data" class="mb-8 rounded-3xl bg-white border border-slate-200 shadow-sm p-6">

    <input type="hidden" name="show_id" value="{{ s['id'] }}">

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

      <!-- BASIC INFO -->
      <div>
        <label class="block text-sm font-medium">Title</label>
        <input name="title" value="{{ s['title'] }}" class="input">
      </div>

      <div>
        <label class="block text-sm font-medium">Slug</label>
        <input name="slug" value="{{ s['slug'] }}" class="input">
      </div>

      <div>
        <label class="block text-sm font-medium">Date</label>
        <input name="date" value="{{ s['date'] }}" class="input">
      </div>

      <div>
        <label class="block text-sm font-medium">General Time (optional)</label>
        <input name="time" value="{{ s['time'] }}" class="input">
      </div>

      <!-- NEW TIMING FIELDS -->
      <div>
        <label class="block text-sm font-medium">Cars Arrival Time</label>
        <input name="cars_arrive_time" value="{{ s['cars_arrive_time'] or '' }}" class="input">
      </div>

      <div>
        <label class="block text-sm font-medium">Day-of Registration Window</label>
        <input name="day_of_registration_time" value="{{ s['day_of_registration_time'] or '' }}" class="input">
      </div>

      <div>
        <label class="block text-sm font-medium">Show Start Time</label>
        <input name="show_start_time" value="{{ s['show_start_time'] or '' }}" class="input">
      </div>

      <div>
        <label class="block text-sm font-medium">Show End Time</label>
        <input name="show_end_time" value="{{ s['show_end_time'] or '' }}" class="input">
      </div>

      <!-- LOCATION -->
      <div>
        <label class="block text-sm font-medium">Location Name</label>
        <input name="location_name" value="{{ s['location_name'] }}" class="input">
      </div>

      <div>
        <label class="block text-sm font-medium">Address</label>
        <input name="address" value="{{ s['address'] }}" class="input">
      </div>

      <!-- FLYER -->
      <div class="md:col-span-2">
        <label class="block text-sm font-medium mb-1">Flyer Image</label>

        {% if s['flyer_image_path'] %}
          <img src="{{ s['flyer_image_path'] }}" class="mb-3 rounded-xl max-h-48">
        {% endif %}

        <input type="file" name="flyer_image" accept=".jpg,.jpeg,.png,.webp">
        <input type="hidden" name="existing_flyer" value="{{ s['flyer_image_path'] }}">
      </div>

      <!-- VOTING -->
      <div>
        <label class="block text-sm font-medium">Vote Price (cents)</label>
        <input name="vote_price_cents" value="{{ s['vote_price_cents'] or 100 }}" class="input">
      </div>

      <div>
        <label class="block text-sm font-medium">Max Votes Per Checkout</label>
        <input name="max_votes_per_checkout" value="{{ s['max_votes_per_checkout'] or 50 }}" class="input">
      </div>

      <!-- PAYMENT -->
      <div>
        <label class="block text-sm font-medium">Payment Mode</label>
        <select name="payment_mode" class="input">
          <option value="stripe" {% if s['payment_mode']=="stripe" %}selected{% endif %}>Stripe</option>
          <option value="external" {% if s['payment_mode']=="external" %}selected{% endif %}>External</option>
        </select>
      </div>

      <div>
        <label class="block text-sm font-medium">External Payment URL</label>
        <input name="external_payment_url" value="{{ s['external_payment_url'] or '' }}" class="input">
      </div>

    </div>

    <div class="mt-6">
      <button class="btn btn-primary">Save Show</button>
    </div>

  </form>
  {% endfor %}

</div>
{% endblock %}
